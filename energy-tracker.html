<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Energy Tracker</title>
  <!-- iPhone / iPad web app -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Energy"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#1e293b"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gas:#f97316;--elec:#3b82f6;--purple:#8b5cf6;--green:#10b981;
      --red:#ef4444;--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;
      --text:#1e293b;--muted:#64748b;--radius:10px;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
    .app{display:flex;flex-direction:column;min-height:100vh}
    .main{flex:1;padding:24px 16px;max-width:960px;margin:0 auto;width:100%}
    .nav{background:#1e293b;color:#fff;padding:0 16px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
    .nav-brand{display:flex;align-items:center;gap:8px;padding:12px 0;flex-shrink:0}
    .nav-logo{font-size:22px}.nav-title{font-weight:700;font-size:16px}
    .nav-tabs{display:flex;gap:2px;flex-wrap:wrap;padding:6px 0}
    .nav-tab{background:none;border:none;color:#94a3b8;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;transition:.15s}
    .nav-tab:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-tab.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
    .page{max-width:720px}
    .page-title{font-size:22px;font-weight:700;margin-bottom:20px}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .page-header .page-title{margin-bottom:0}
    .section{margin-bottom:28px}
    .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-top:4px solid;border-radius:var(--radius);padding:16px;display:flex;gap:12px;box-shadow:var(--shadow)}
    .stat-icon{font-size:24px;flex-shrink:0}.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .stat-value{font-size:20px;font-weight:700;margin-top:2px}.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);overflow-x:auto}
    .empty-state{text-align:center;padding:60px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .empty-icon{font-size:48px;margin-bottom:12px}.empty-state h2{font-size:20px;margin-bottom:8px}.empty-state p{color:var(--muted);margin-bottom:6px}
    .form{display:flex;flex-direction:column;gap:16px}
    .form-group{display:flex;flex-direction:column;gap:4px}
    .form-label{font-size:13px;font-weight:600;color:var(--muted)}
    .form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:15px;background:var(--surface);transition:.15s;font-family:inherit}
    .form-input:focus{outline:none;border-color:var(--elec);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
    .form-hint{font-size:12px;color:var(--muted);margin-top:3px}.form-hint.ok{color:var(--green)}
    .input-row{display:flex;gap:8px;align-items:center}.input-row .form-input{flex:1}
    .meter-fieldset{border-radius:var(--radius);padding:16px;border:2px solid var(--border)}
    .meter-fieldset.gas{border-color:#fed7aa;background:#fffbf7}
    .meter-fieldset.electricity{border-color:#bfdbfe;background:#f0f7ff}
    .meter-fieldset legend{font-weight:700;font-size:14px;padding:0 6px;border-radius:4px}
    .meter-fieldset.gas legend{background:#fffbf7}.meter-fieldset.electricity legend{background:#f0f7ff}
    .photo-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .ocr-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px}
    .ocr-badge.success{background:#dcfce7;color:#166534}.ocr-badge.error{background:#fee2e2;color:#991b1b}
    .meter-preview{max-width:100%;max-height:180px;object-fit:contain;border-radius:6px;border:1px solid var(--border);margin-bottom:12px;display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:600;border-radius:7px;border:none;cursor:pointer;transition:.15s;padding:8px 16px;font-family:inherit}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
    .btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--bg)}
    .btn-ghost{background:transparent;color:var(--muted)}.btn-ghost:hover{background:var(--bg);color:var(--text)}
    .btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
    .btn-danger-outline{background:transparent;border:1.5px solid var(--red);color:var(--red)}.btn-danger-outline:hover{background:#fee2e2}
    .btn-sm{padding:4px 10px;font-size:13px}.btn-lg{padding:11px 24px;font-size:15px;width:100%;margin-top:4px}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .alert{padding:10px 14px;border-radius:7px;font-size:14px;margin-bottom:16px}
    .alert-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
    .alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .alert-info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
    .info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:12px 14px;font-size:13px;color:#1e40af;margin-bottom:16px;line-height:1.8}
    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
    .data-table{width:100%;border-collapse:collapse;background:var(--surface);font-size:13px}
    .data-table th{text-align:left;padding:10px 12px;background:#f1f5f9;font-weight:600;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border)}
    .data-table td{padding:9px 12px;border-bottom:1px solid var(--border)}
    .data-table tr:last-child td{border-bottom:none}.data-table tr:hover td{background:#f8fafc}
    .td-date{white-space:nowrap;font-weight:600}.td-num{text-align:right;font-variant-numeric:tabular-nums}
    .td-gas{text-align:right;color:var(--gas);font-weight:600}.td-elec{text-align:right;color:var(--elec);font-weight:600}
    .td-cost{text-align:right;color:var(--purple);font-weight:600}.table-meta{font-size:12px;color:var(--muted);margin-top:8px}
    .confirm-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .settings-section-title{font-size:15px;font-weight:700;margin-bottom:14px}
    .danger-zone{border-color:#fecaca}
    .toggle-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer}
    /* SVG Chart */
    .chart-legend{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--muted)}
    .chart-legend span{display:flex;align-items:center;gap:5px}
    .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    /* Elec placeholder card */
    .elec-placeholder{background:#f0f7ff;border:1.5px dashed #93c5fd;border-radius:var(--radius);padding:20px;text-align:center}
    .elec-placeholder p{color:#1e40af;font-size:13px;margin-bottom:12px}
    @media(max-width:640px){.main{padding:16px 12px}.stat-grid{grid-template-columns:1fr 1fr}.nav-tab span:last-child{display:none}.nav-tab{padding:8px}}
    @media(max-width:400px){.stat-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useRef, useMemo } from 'https://esm.sh/preact@10/hooks';
import htm from 'https://esm.sh/htm@3';
const html = htm.bind(h);

// ── Historical data ───────────────────────────────────────────────────────────
const HISTORICAL_GAS = [

// Elektra readings (kWh, cumulative meter)
const HISTORICAL_ELEC = [

  ['2023-02-16',67168],['2023-03-01',67218],['2023-03-15',67246],

  ['2025-08-01',69925],['2025-09-01',70027],['2025-10-01',70106],
  ['2025-11-01',70225],['2025-11-30',70351],['2025-12-31',70486],
  ['2026-01-31',70621],['2026-02-28',70742],['2026-03-28',70864],
].map(([date, elec], i) => ({
  id: `hist-e${i}`, date, gasReading: null,
  electricityReading: elec, source: 'import',
}));

const HISTORICAL = [...HISTORICAL_GAS, ...HISTORICAL_ELEC]
  .sort((a,b) => new Date(a.date) - new Date(b.date));

// ── Storage ──────────────────────────────────────────────────────────────────
const RK = 'energy_readings_v2', SK = 'energy_settings';
const DEFAULT_SETTINGS = { gasRate: 0.80, electricityRate: 0.22, apiKey: '' };

function sortR(arr) { return [...arr].sort((a,b)=>new Date(a.date)-new Date(b.date)); }

function loadReadings() {
  try {
    const stored = localStorage.getItem(RK);
    if (stored) {
      const parsed = sortR(JSON.parse(stored));
      // Always merge any new HISTORICAL entries not yet in localStorage (matched by id)
      const ids = new Set(parsed.map(r => r.id));
      const newEntries = HISTORICAL.filter(r => !ids.has(r.id));
      if (newEntries.length) {
        const merged = sortR([...parsed, ...newEntries]);
        saveReadings(merged);
        return merged;
      }
      return parsed;
    }
    // First run: seed with full historical data
    saveReadings(HISTORICAL);
    return [...HISTORICAL];
  } catch { return [...HISTORICAL]; }
}
function saveReadings(r) { localStorage.setItem(RK, JSON.stringify(r)); }
function loadSettings() {
  try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(SK)||'{}') }; }
  catch { return DEFAULT_SETTINGS; }
}
function saveSettings(s) { localStorage.setItem(SK, JSON.stringify(s)); }

// ── Calculations ─────────────────────────────────────────────────────────────
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthLabel(ym) { const [y,m]=ym.split('-'); return `${MO[+m-1]} '${y.slice(2)}`; }

function calcMonthly(readings, settings) {
  const byMonth = {};
  const ensure = mo => { if (!byMonth[mo]) byMonth[mo] = { gas:0, elec:0, hasElec:false }; };

  // Gas: iterate only readings that have a gas value
  const gasR = readings.filter(r => r.gasReading !== null);
  for (let i = 1; i < gasR.length; i++) {
    const p = gasR[i-1], c = gasR[i];
    const mo = c.date.slice(0,7);
    ensure(mo);
    byMonth[mo].gas += Math.max(0, c.gasReading - p.gasReading);
  }

  // Electricity: iterate only readings that have an electricity value
  const elecR = readings.filter(r => r.electricityReading !== null);
  for (let i = 1; i < elecR.length; i++) {
    const p = elecR[i-1], c = elecR[i];
    const mo = c.date.slice(0,7);
    ensure(mo);
    byMonth[mo].elec += Math.max(0, c.electricityReading - p.electricityReading);
    byMonth[mo].hasElec = true;
  }

  return Object.entries(byMonth).sort(([a],[b])=>a.localeCompare(b)).map(([mo,v])=>({
    month: mo, label: monthLabel(mo),
    gasUsage: +v.gas.toFixed(3),
    electricityUsage: v.hasElec ? +v.elec.toFixed(1) : null,
    gasCost: +(v.gas * settings.gasRate).toFixed(2),
    electricityCost: v.hasElec ? +(v.elec * settings.electricityRate).toFixed(2) : null,
    totalCost: +(v.gas * settings.gasRate + (v.hasElec ? v.elec * settings.electricityRate : 0)).toFixed(2),
  }));
}

function fmtM3(v)  { return (+v).toLocaleString('nl-NL',{minimumFractionDigits:0,maximumFractionDigits:1}); }
function fmtKWh(v) { return (+v).toLocaleString('nl-NL',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtEur(v) { return (+v).toLocaleString('nl-NL',{style:'currency',currency:'EUR'}); }

// ── Claude OCR ───────────────────────────────────────────────────────────────
async function extractMeterReading(base64, mimeType, meterType, apiKey) {
  const unit = meterType === 'gas' ? 'm³' : 'kWh';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-requests':'true'},
    body: JSON.stringify({
      model:'claude-opus-4-6', max_tokens:256,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mimeType,data:base64}},
        {type:'text',text:`This is a ${meterType} meter (${unit}). Read the display and return ONLY JSON: {"reading": 12345.6}. If unreadable: {"reading": null}.`},
      ]}],
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.content?.[0]?.text ?? '';
  const m = text.match(/\{[^}]+\}/);
  if (!m) return null;
  try { const p = JSON.parse(m[0]); return typeof p.reading === 'number' ? p.reading : null; }
  catch { return null; }
}
function fileToB64(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res({base64:e.target.result.split(',')[1],mimeType:file.type});
    r.onerror=rej; r.readAsDataURL(file);
  });
}

// ── SVG Bar Charts ────────────────────────────────────────────────────────────
function BarChart({ data, valueKey, color, unit }) {
  const [tip, setTip] = useState(null);
  const filtered = data.filter(d => d[valueKey] !== null);
  if (!filtered.length) return html`<p style=${{color:'#94a3b8',textAlign:'center',padding:'20px 0'}}>No data yet</p>`;
  const maxVal = Math.max(...filtered.map(d=>d[valueKey]), 0.001);
  const barW = Math.max(28, Math.min(56, 580/filtered.length));
  const padL=46, padB=28, padT=8, padR=8;
  const cW = filtered.length*barW+padL+padR, cH = 200+padB+padT;
  const H = 200;
  const sy = v => padT+H-(v/maxVal)*H;
  return html`
    <div style=${{overflowX:'auto',position:'relative'}}>
      ${tip && html`<div style=${{position:'fixed',left:tip.x+12+'px',top:tip.y-38+'px',background:'#1e293b',color:'#fff',padding:'5px 10px',borderRadius:'6px',fontSize:'12px',pointerEvents:'none',zIndex:999,whiteSpace:'nowrap'}}>
        ${tip.label}: ${tip.raw} ${unit}
      </div>`}
      <svg viewBox="0 0 ${cW} ${cH}" style=${{display:'block',minWidth:'100%',height:cH+'px'}}>
        ${[.25,.5,.75,1].map(f=>html`<g key=${f}>
          <line x1=${padL} y1=${sy(f*maxVal)} x2=${cW-padR} y2=${sy(f*maxVal)} stroke="#e5e7eb" stroke-width="1"/>
          <text x=${padL-4} y=${sy(f*maxVal)+4} text-anchor="end" font-size="10" fill="#94a3b8">${Math.round(f*maxVal)}</text>
        </g>`)}
        ${filtered.map((d,i)=>{
          const val=d[valueKey], bH=(val/maxVal)*H, x=padL+i*barW+barW*.1, w=barW*.8;
          return html`<g key=${i}
            onMouseMove=${e=>setTip({x:e.clientX,y:e.clientY,label:d.label,raw:val})}
            onMouseLeave=${()=>setTip(null)} style=${{cursor:'default'}}>
            <rect x=${x} y=${sy(val)} width=${w} height=${bH} fill=${color} rx="3" opacity=".85"/>
            <text x=${x+w/2} y=${cH-padB+14} text-anchor="middle" font-size=${barW>40?10:8} fill="#64748b">${d.label}</text>
          </g>`;
        })}
        <line x1=${padL} y1=${padT} x2=${padL} y2=${cH-padB} stroke="#e2e8f0" stroke-width="1.5"/>
        <line x1=${padL} y1=${cH-padB} x2=${cW-padR} y2=${cH-padB} stroke="#e2e8f0" stroke-width="1.5"/>
      </svg>
    </div>`;
}

function StackedCostChart({ data }) {
  const [tip, setTip] = useState(null);
  const filtered = data.filter(d => d.gasCost > 0 || d.electricityCost > 0);
  if (!filtered.length) return null;
  const maxVal = Math.max(...filtered.map(d=>(d.gasCost||0)+(d.electricityCost||0)), 0.001);
  const barW = Math.max(28,Math.min(56,580/filtered.length));
  const padL=52, padB=28, padT=8, padR=8;
  const cW=filtered.length*barW+padL+padR, cH=220+padB+padT, H=220;
  const sy=v=>padT+H-(v/maxVal)*H;
  return html`
    <div style=${{overflowX:'auto',position:'relative'}}>
      ${tip && html`<div style=${{position:'fixed',left:tip.x+12+'px',top:tip.y-60+'px',background:'#1e293b',color:'#fff',padding:'6px 10px',borderRadius:'6px',fontSize:'12px',pointerEvents:'none',zIndex:999,lineHeight:1.7}}>
        <b>${tip.label}</b><br/>🔥 ${fmtEur(tip.gas)}${tip.elec!=null?html`<br/>⚡ ${fmtEur(tip.elec)}`:null}
      </div>`}
      <svg viewBox="0 0 ${cW} ${cH}" style=${{display:'block',minWidth:'100%',height:cH+'px'}}>
        ${[.25,.5,.75,1].map(f=>html`<g key=${f}>
          <line x1=${padL} y1=${sy(f*maxVal)} x2=${cW-padR} y2=${sy(f*maxVal)} stroke="#e5e7eb" stroke-width="1"/>
          <text x=${padL-4} y=${sy(f*maxVal)+4} text-anchor="end" font-size="10" fill="#94a3b8">€${Math.round(f*maxVal)}</text>
        </g>`)}
        ${filtered.map((d,i)=>{
          const gasH=(d.gasCost/maxVal)*H;
          const elecH=d.electricityCost!=null?(d.electricityCost/maxVal)*H:0;
          const total=(d.gasCost||0)+(d.electricityCost||0);
          const x=padL+i*barW+barW*.1, w=barW*.8;
          return html`<g key=${i}
            onMouseMove=${e=>setTip({x:e.clientX,y:e.clientY,label:d.label,gas:d.gasCost,elec:d.electricityCost})}
            onMouseLeave=${()=>setTip(null)} style=${{cursor:'default'}}>
            <rect x=${x} y=${sy(total)} width=${w} height=${gasH} fill="#f97316" rx="2" opacity=".85"/>
            ${elecH>0&&html`<rect x=${x} y=${sy(d.electricityCost)} width=${w} height=${elecH} fill="#3b82f6" rx="2" opacity=".85"/>`}
            <text x=${x+w/2} y=${cH-padB+14} text-anchor="middle" font-size=${barW>40?10:8} fill="#64748b">${d.label}</text>
          </g>`;
        })}
        <line x1=${padL} y1=${padT} x2=${padL} y2=${cH-padB} stroke="#e2e8f0" stroke-width="1.5"/>
        <line x1=${padL} y1=${cH-padB} x2=${cW-padR} y2=${cH-padB} stroke="#e2e8f0" stroke-width="1.5"/>
      </svg>
      <div class="chart-legend">
        <span><span class="legend-dot" style=${{background:'#f97316'}}></span>Gas</span>
        <span><span class="legend-dot" style=${{background:'#3b82f6'}}></span>Electricity</span>
      </div>
    </div>`;
}

// ── Navigation ────────────────────────────────────────────────────────────────
const TABS=[{id:'dashboard',label:'Dashboard',icon:'📊'},{id:'add',label:'Add Reading',icon:'📷'},{id:'history',label:'History',icon:'📋'},{id:'settings',label:'Settings',icon:'⚙️'}];
function Navigation({active,onChange}){
  return html`<nav class="nav">
    <div class="nav-brand"><span class="nav-logo">⚡</span><span class="nav-title">Energy Tracker</span></div>
    <div class="nav-tabs">
      ${TABS.map(t=>html`<button key=${t.id} class=${'nav-tab'+(active===t.id?' active':'')} onClick=${()=>onChange(t.id)}>
        <span>${t.icon}</span><span>${t.label}</span>
      </button>`)}
    </div>
  </nav>`;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function StatCard({label,value,sub,color,icon}){
  return html`<div class="stat-card" style=${{borderTopColor:color}}>
    <div class="stat-icon">${icon}</div>
    <div><div class="stat-label">${label}</div><div class="stat-value" style=${{color}}>${value}</div>${sub&&html`<div class="stat-sub">${sub}</div>`}</div>
  </div>`;
}

function Dashboard({readings,settings,onGoAdd}){
  const monthly = useMemo(()=>calcMonthly(readings,settings),[readings,settings]);
  const last12  = monthly.slice(-12);
  const cur=monthly[monthly.length-1], prev=monthly[monthly.length-2];
  const hasElec = readings.some(r=>r.electricityReading!==null);

  if (readings.length < 2) return html`
    <div class="empty-state"><div class="empty-icon">⚡</div><h2>No data yet</h2><p>Add meter readings to see your usage.</p></div>`;

  const gasR=readings.filter(r=>r.gasReading!==null);
  const elecR=readings.filter(r=>r.electricityReading!==null);
  const firstGas=gasR[0], lastGas=gasR[gasR.length-1];
  const firstElec=elecR[0], lastElec=elecR[elecR.length-1];
  const totalGas=gasR.length>1?Math.max(0,lastGas.gasReading-firstGas.gasReading):0;
  const totalElec=elecR.length>1?Math.max(0,lastElec.electricityReading-firstElec.electricityReading):0;
  const totalCost=monthly.reduce((s,m)=>s+m.totalCost,0);

  return html`<div>
    <div class="section">
      <div class="section-title">${cur?`${cur.label} — Current Month`:'Summary'}</div>
      <div class="stat-grid">
        <${StatCard} label="Gas used" value=${`${fmtM3(cur?.gasUsage??0)} m³`} sub=${cur?fmtEur(cur.gasCost):null} color="var(--gas)" icon="🔥"/>
        ${hasElec
          ? html`<${StatCard} label="Electricity used" value=${`${fmtKWh(cur?.electricityUsage??0)} kWh`} sub=${cur?.electricityCost!=null?fmtEur(cur.electricityCost):null} color="var(--elec)" icon="⚡"/>`
          : html`<div class="elec-placeholder"><p>⚡ No electricity data yet</p><button class="btn btn-outline btn-sm" onClick=${onGoAdd}>Add electricity reading →</button></div>`}
        <${StatCard} label="Gas cost this month" value=${fmtEur(cur?.gasCost??0)} sub=${prev?`vs ${fmtEur(prev.gasCost)} prev.`:null} color="var(--purple)" icon="💶"/>
        <${StatCard} label="All-time gas cost" value=${fmtEur(totalGas*settings.gasRate)} sub=${firstGas?`${firstGas.date} – ${lastGas.date}`:null} color="var(--green)" icon="📈"/>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Monthly Gas Usage (m³)</div>
      <div class="chart-wrap"><${BarChart} data=${last12} valueKey="gasUsage" color="var(--gas)" unit="m³"/></div>
    </div>

    ${hasElec && html`<div class="section">
      <div class="section-title">Monthly Electricity Usage (kWh)</div>
      <div class="chart-wrap"><${BarChart} data=${last12} valueKey="electricityUsage" color="var(--elec)" unit="kWh"/></div>
    </div>`}

    <div class="section">
      <div class="section-title">Monthly Energy Costs (€)</div>
      <div class="chart-wrap"><${StackedCostChart} data=${last12}/></div>
    </div>

    <div class="section">
      <div class="section-title">All-time Totals</div>
      <div class="stat-grid">
        <${StatCard} label="Total gas" value=${`${fmtM3(totalGas)} m³`} color="var(--gas)" icon="🔥"/>
        ${hasElec&&html`<${StatCard} label="Total electricity" value=${`${fmtKWh(totalElec)} kWh`} color="var(--elec)" icon="⚡"/>`}
        <${StatCard} label="Gas cost" value=${fmtEur(totalGas*settings.gasRate)} color="var(--gas)" icon="💶"/>
        ${hasElec&&html`<${StatCard} label="Electricity cost" value=${fmtEur(totalElec*settings.electricityRate)} color="var(--elec)" icon="💶"/>`}
      </div>
    </div>
  </div>`;
}

// ── Add Reading ───────────────────────────────────────────────────────────────
function AddReading({settings,onSave,lastGasReading,lastElecReading}){
  const today=new Date().toISOString().slice(0,10);
  const [date,setDate]=useState(today);
  const [gas,setGas]=useState('');
  const [elec,setElec]=useState('');
  const [notes,setNotes]=useState('');
  const [gasOcr,setGasOcr]=useState('idle');
  const [elecOcr,setElecOcr]=useState('idle');
  const [gasPrev,setGasPrev]=useState(null);
  const [elecPrev,setElecPrev]=useState(null);
  const [error,setError]=useState('');
  const [success,setSuccess]=useState(false);
  const [src,setSrc]=useState('manual');
  const gasRef=useRef(null), elecRef=useRef(null);
  const hasElecHistory = lastElecReading != null;

  async function doOcr(file,type,setOcr,setVal,setPrev){
    if(!settings.apiKey){setError('Add your Claude API key in Settings to use photo OCR.');return;}
    setOcr('loading');setError('');
    const fr=new FileReader();fr.onload=e=>setPrev(e.target.result);fr.readAsDataURL(file);
    try{
      const {base64,mimeType}=await fileToB64(file);
      const val=await extractMeterReading(base64,mimeType,type,settings.apiKey);
      if(val!==null){setVal(String(val));setOcr('done');setSrc('photo');}
      else{setOcr('error');setError(`Could not read the ${type} meter. Please enter manually.`);}
    }catch(e){setOcr('error');setError(`OCR error: ${e.message}`);}
  }

  function submit(e){
    e.preventDefault();setError('');
    const g=parseFloat(gas);
    if(isNaN(g)){setError('Enter a valid gas reading.');return;}
    const el=elec.trim()===''?null:parseFloat(elec);
    if(elec.trim()!==''&&isNaN(el)){setError('Enter a valid electricity reading (or leave blank).');return;}
    if(lastGasReading){
      if(g<lastGasReading.gasReading){setError(`Gas (${g}) is below last reading (${lastGasReading.gasReading}).`);return;}
    }
    if(el!==null&&lastElecReading){
      if(el<lastElecReading.electricityReading){setError(`Electricity (${el}) is below last reading (${lastElecReading.electricityReading}).`);return;}
    }
    onSave({id:crypto.randomUUID(),date,gasReading:g,electricityReading:el,notes:notes||undefined,source:src});
    setSuccess(true);setTimeout(()=>setSuccess(false),3000);
    setGas('');setElec('');setNotes('');setGasPrev(null);setElecPrev(null);setGasOcr('idle');setElecOcr('idle');setSrc('manual');
  }

  return html`<div class="page">
    <h1 class="page-title">Add Meter Reading</h1>
    <div class="info-box">
      ${lastGasReading&&html`<strong>Last gas</strong> (${lastGasReading.date}): <strong>${lastGasReading.gasReading} m³</strong>`}
      ${lastElecReading&&html`${'  '}· <strong>Last electricity</strong> (${lastElecReading.date}): <strong>${lastElecReading.electricityReading} kWh</strong>`}
    </div>
    ${!hasElecHistory&&html`<div class="alert alert-info">💡 No electricity history yet. Enter your current electricity meter reading below to start tracking it.</div>`}
    ${success&&html`<div class="alert alert-success">✓ Reading saved!</div>`}
    ${error&&html`<div class="alert alert-error">${error}</div>`}
    <form class="form" onSubmit=${submit}>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" value=${date} onInput=${e=>setDate(e.target.value)} required/>
      </div>

      <fieldset class="meter-fieldset gas">
        <legend>🔥 Gas Meter (m³)</legend>
        <div class="photo-row">
          <button type="button" class="btn btn-outline" onClick=${()=>gasRef.current.click()} disabled=${gasOcr==='loading'}>
            ${gasOcr==='loading'?'⏳ Reading...':'📷 Take / Upload Photo'}
          </button>
          <input ref=${gasRef} type="file" accept="image/*" capture="environment" style="display:none"
            onChange=${e=>{const f=e.target.files[0];if(f)doOcr(f,'gas',setGasOcr,setGas,setGasPrev);e.target.value='';}}/>
          ${gasOcr==='done'&&html`<span class="ocr-badge success">✓ OCR extracted</span>`}
          ${gasOcr==='error'&&html`<span class="ocr-badge error">✗ OCR failed</span>`}
        </div>
        ${gasPrev&&html`<img src=${gasPrev} class="meter-preview" alt="Gas meter"/>`}
        <div class="form-group">
          <label class="form-label">Reading (m³)</label>
          <input type="number" class="form-input" step="0.001"
            placeholder=${lastGasReading?`Last: ${lastGasReading.gasReading}`:'e.g. 30195.000'}
            value=${gas} onInput=${e=>setGas(e.target.value)} required/>
        </div>
      </fieldset>

      <fieldset class="meter-fieldset electricity">
        <legend>⚡ Electricity Meter (kWh)</legend>
        <div class="photo-row">
          <button type="button" class="btn btn-outline" onClick=${()=>elecRef.current.click()} disabled=${elecOcr==='loading'}>
            ${elecOcr==='loading'?'⏳ Reading...':'📷 Take / Upload Photo'}
          </button>
          <input ref=${elecRef} type="file" accept="image/*" capture="environment" style="display:none"
            onChange=${e=>{const f=e.target.files[0];if(f)doOcr(f,'electricity',setElecOcr,setElec,setElecPrev);e.target.value='';}}/>
          ${elecOcr==='done'&&html`<span class="ocr-badge success">✓ OCR extracted</span>`}
          ${elecOcr==='error'&&html`<span class="ocr-badge error">✗ OCR failed</span>`}
        </div>
        ${elecPrev&&html`<img src=${elecPrev} class="meter-preview" alt="Electricity meter"/>`}
        <div class="form-group">
          <label class="form-label">Reading (kWh) ${!hasElecHistory?'':'optional'}</label>
          <input type="number" class="form-input" step="1"
            placeholder=${lastElecReading?`Last: ${lastElecReading.electricityReading}`:'e.g. 70225 (leave blank to skip)'}
            value=${elec} onInput=${e=>setElec(e.target.value)}/>
          ${!hasElecHistory&&html`<p class="form-hint">Enter your current meter reading to start tracking electricity from now on.</p>`}
        </div>
      </fieldset>

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input type="text" class="form-input" placeholder="e.g. After vacation"
          value=${notes} onInput=${e=>setNotes(e.target.value)}/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Save Reading</button>
    </form>
  </div>`;
}

// ── History ───────────────────────────────────────────────────────────────────
function History({readings,settings,onDelete}){
  const [confirmId,setConfirmId]=useState(null);
  const [showCosts,setShowCosts]=useState(true);
  if(!readings.length)return html`<div class="page"><h1 class="page-title">History</h1><div class="empty-state"><div class="empty-icon">📋</div><p>No readings yet.</p></div></div>`;
  const rev=[...readings].reverse();
  const hasElec=readings.some(r=>r.electricityReading!==null);
  return html`<div class="page">
    <div class="page-header">
      <h1 class="page-title">Reading History</h1>
      <label class="toggle-label"><input type="checkbox" checked=${showCosts} onChange=${e=>setShowCosts(e.target.checked)}/> Costs</label>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Date</th><th>Gas m³</th><th>Used m³</th>
          ${hasElec?html`<th>Elec kWh</th><th>Used kWh</th>`:null}
          ${showCosts?html`<th>Cost</th>`:null}
          <th>Src</th><th></th>
        </tr></thead>
        <tbody>
          ${rev.map(r=>{
            const idx=readings.indexOf(r);
            let used=null;
            if(idx>0){
              const p=readings[idx-1];
              const g=(r.gasReading!==null&&p.gasReading!==null)?Math.max(0,r.gasReading-p.gasReading):null;
              const el=(p.electricityReading!==null&&r.electricityReading!==null)?Math.max(0,r.electricityReading-p.electricityReading):null;
              used={g,el,cost:(g!==null?g*settings.gasRate:0)+(el!==null?el*settings.electricityRate:0)};
            }
            return html`<tr key=${r.id}>
              <td class="td-date">${r.date}</td>
              <td class="td-num">${r.gasReading!==null?r.gasReading.toLocaleString('nl-NL',{minimumFractionDigits:3,maximumFractionDigits:3}):'—'}</td>
              <td class="td-gas">${used?.g!=null?`+${fmtM3(used.g)}`:'—'}</td>
              ${hasElec?html`
                <td class="td-num">${r.electricityReading!==null?r.electricityReading.toLocaleString('nl-NL'):'—'}</td>
                <td class="td-elec">${used?.el!=null?`+${fmtKWh(used.el)}`:'—'}</td>
              `:null}
              ${showCosts?html`<td class="td-cost">${used?(used.g!==null||used.el!==null)?fmtEur(used.cost):'—':'—'}</td>`:null}
              <td>${r.source==='photo'?'📷':r.source==='import'?'📥':'✏️'}</td>
              <td>${confirmId===r.id
                ?html`<span class="confirm-row">
                    <button class="btn btn-danger btn-sm" onClick=${()=>{onDelete(r.id);setConfirmId(null)}}>Delete</button>
                    <button class="btn btn-ghost btn-sm" onClick=${()=>setConfirmId(null)}>Cancel</button>
                  </span>`
                :html`<button class="btn btn-ghost btn-sm" onClick=${()=>setConfirmId(r.id)}>🗑</button>`}
              </td>
            </tr>`;
          })}
        </tbody>
      </table>
    </div>
    <p class="table-meta">${readings.length} readings · ${readings[0].date} to ${readings[readings.length-1].date}</p>
  </div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function SettingsPage({settings,onSave,readingCount,onClearAll}){
  const [gasRate,setGasRate]=useState(String(settings.gasRate));
  const [elecRate,setElecRate]=useState(String(settings.electricityRate));
  const [apiKey,setApiKey]=useState(settings.apiKey);
  const [showKey,setShowKey]=useState(false);
  const [saved,setSaved]=useState(false);
  const [confirm,setConfirm]=useState(false);
  function save(e){
    e.preventDefault();
    onSave({gasRate:parseFloat(gasRate)||0,electricityRate:parseFloat(elecRate)||0,apiKey:apiKey.trim()});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  }
  return html`<div class="page">
    <h1 class="page-title">Settings</h1>
    ${saved&&html`<div class="alert alert-success">✓ Settings saved!</div>`}
    <form class="form" onSubmit=${save}>
      <div class="settings-section">
        <div class="settings-section-title">🔥 Gas Rate</div>
        <div class="form-group">
          <label class="form-label">Price per m³ (€)</label>
          <input type="number" class="form-input" step="0.0001" min="0" value=${gasRate} onInput=${e=>setGasRate(e.target.value)}/>
          <p class="form-hint">Dutch average ~€0.80–€1.20 per m³</p>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">⚡ Electricity Rate</div>
        <div class="form-group">
          <label class="form-label">Price per kWh (€)</label>
          <input type="number" class="form-input" step="0.0001" min="0" value=${elecRate} onInput=${e=>setElecRate(e.target.value)}/>
          <p class="form-hint">Dutch average ~€0.22–€0.28 per kWh</p>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">🤖 Claude API Key (for photo OCR)</div>
        <p class="form-hint" style=${{marginBottom:10}}>Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Stored only in your browser.</p>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <div class="input-row">
            <input type=${showKey?'text':'password'} class="form-input" placeholder="sk-ant-..."
              value=${apiKey} onInput=${e=>setApiKey(e.target.value)} autocomplete="off"/>
            <button type="button" class="btn btn-ghost btn-sm" onClick=${()=>setShowKey(v=>!v)}>${showKey?'🙈':'👁️'}</button>
          </div>
          ${apiKey&&html`<p class="form-hint ok">✓ API key configured</p>`}
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Save Settings</button>
    </form>
    <div class="settings-section danger-zone" style=${{marginTop:24}}>
      <div class="settings-section-title">⚠️ Data</div>
      <p class="form-hint" style=${{marginBottom:12}}>${readingCount} readings stored in this browser.</p>
      ${confirm
        ?html`<div class="confirm-row">
            <span>Delete all readings permanently?</span>
            <button class="btn btn-danger" onClick=${()=>{onClearAll();setConfirm(false)}}>Yes, delete all</button>
            <button class="btn btn-ghost" onClick=${()=>setConfirm(false)}>Cancel</button>
          </div>`
        :html`<button class="btn btn-danger-outline" onClick=${()=>setConfirm(true)}>Clear all readings</button>`}
    </div>
  </div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('dashboard');
  const [readings,setReadings]=useState(loadReadings);
  const [settings,setSettings]=useState(loadSettings);

  function handleSave(reading){
    setReadings(prev=>{
      const updated=sortR([...prev.filter(r=>r.id!==reading.id),reading]);
      saveReadings(updated);return updated;
    });
  }
  function handleDelete(id){
    setReadings(prev=>{const u=prev.filter(r=>r.id!==id);saveReadings(u);return u;});
  }
  function handleSaveSettings(s){saveSettings(s);setSettings(s);}
  function handleClearAll(){saveReadings([]);setReadings([]);}

  const lastGasReading=readings.filter(r=>r.gasReading!==null).pop();
  const lastElecReading=readings.filter(r=>r.electricityReading!==null).pop();

  return html`<div class="app">
    <${Navigation} active=${tab} onChange=${setTab}/>
    <main class="main">
      ${tab==='dashboard'&&html`<${Dashboard} readings=${readings} settings=${settings} onGoAdd=${()=>setTab('add')}/>`}
      ${tab==='add'&&html`<${AddReading} settings=${settings} lastGasReading=${lastGasReading} lastElecReading=${lastElecReading} onSave=${r=>{handleSave(r);setTab('dashboard')}}/>`}
      ${tab==='history'&&html`<${History} readings=${readings} settings=${settings} onDelete=${handleDelete}/>`}
      ${tab==='settings'&&html`<${SettingsPage} settings=${settings} onSave=${handleSaveSettings} readingCount=${readings.length} onClearAll=${handleClearAll}/>`}
    </main>
  </div>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
